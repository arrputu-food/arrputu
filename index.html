        .footer p { margin: 12px 0; font-size: 18px; color: #ffffff; font-weight: 500; }
        .footer strong { color: #f1c40f; font-size: 20px; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; }
        .btn { padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 15px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-phone { background-color: #27ae60; color: white; }
